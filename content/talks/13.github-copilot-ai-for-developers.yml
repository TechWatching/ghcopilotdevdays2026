title: "GitHub Copilot : l'IA au service des développeurs"
meetup: 6
abstract: "Lors de cette présentation, Tug exposera l'architecture de GitHub Copilot 🛠️. Fort de son expérience, il mettra en lumière divers cas d'utilisation à travers des démonstrations pratiques 🔍, permettant aux participants de découvrir comment cette IA transforme le quotidien des développeurs. Cette session ne se limitera pas aux aspects positifs : Tug partagera également les écueils à éviter ainsi que les connaissances essentielles pour naviguer avec succès dans l'univers de GitHub Copilot"
