title: Data, AI & Delivery - Databricks
meetup: 6
abstract: "Il est assez simple de faire un POC en IA aujourd'hui, pourtant l'intégration dans l'écosystème est souvent négligée ce qui réduit le taux de mise en prod. Dans cette présentation, nous vous montrerons comment, grâce à une plateforme unifiée, Azure Databricks simplifie l'intégration de projets d'IA dans un environnement de prod."
